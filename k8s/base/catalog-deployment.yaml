apiVersion: apps/v1
kind: Deployment
metadata:
  name: miniflix-catalog
  namespace: miniflix
spec:
  replicas: 2
  selector:
    matchLabels:
      app: miniflix-catalog
  template:
    metadata:
      labels:
        app: miniflix-catalog
    spec:
      containers:
        - name: api
          image: tiangolo/uvicorn-gunicorn-fastapi:python3.11
          env:
            - name: MODULE_NAME
              value: "main"
            - name: VARIABLE_NAME
              value: "app"
          ports:
            - containerPort: 80
          volumeMounts:
            - name: app
              mountPath: /app/main.py
              subPath: main.py
      volumes:
        - name: app
          configMap:
            name: miniflix-catalog
            items:
              - key: main.py
                path: main.py
