apiVersion: apps/v1
kind: Deployment
metadata:
  name: miniflix-frontend
  namespace: miniflix
spec:
  replicas: 2
  selector:
    matchLabels:
      app: miniflix-frontend
  template:
    metadata:
      labels:
        app: miniflix-frontend
    spec:
      containers:
        - name: frontend
          image: miniflix-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
