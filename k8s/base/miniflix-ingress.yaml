apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: miniflix-ingress
  namespace: miniflix
spec:
  ingressClassName: nginx
  rules:
    - host: miniflix.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: miniflix-catalog
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: miniflix-frontend
                port:
                  number: 80
